<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Puzzle Game 🧩</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

#moves {
  margin-bottom: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 100px);
  grid-gap: 5px;
  justify-content: center;
}

.tile {
  width: 100px;
  height: 100px;
  background: #fff;
  color: #333;
  font-size: 30px;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 10px;
  cursor: pointer;
}

.empty {
  background: transparent;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<h1>🧩 Puzzle Game</h1>
<div id="moves">Moves: 0</div>

<div class="grid" id="grid"></div>

<button onclick="shuffle()">Shuffle</button>

<script>
let tiles = [1,2,3,4,5,6,7,8,null];
let moves = 0;

function draw() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  tiles.forEach((tile, index) => {
    const div = document.createElement("div");
    div.className = "tile";

    if (tile === null) {
      div.classList.add("empty");
    } else {
      div.innerText = tile;
      div.onclick = () => move(index);
    }

    grid.appendChild(div);
  });

  document.getElementById("moves").innerText = "Moves: " + moves;
}

function move(index) {
  const emptyIndex = tiles.indexOf(null);

  const validMoves = [
    index - 1,
    index + 1,
    index - 3,
    index + 3
  ];

  if (validMoves.includes(emptyIndex)) {
    [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
    moves++;
    draw();
    checkWin();
  }
}

function shuffle() {
  tiles.sort(() => Math.random() - 0.5);
  moves = 0;
  draw();
}

function checkWin() {
  const win = [1,2,3,4,5,6,7,8,null];
  if (tiles.toString() === win.toString()) {
    setTimeout(() => {
      alert("🎉 You Win!");
    }, 200);
  }
}

draw();
</script>

</body>
</html>
