<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game Edu 🐍</title>

<style>
body {
  background: linear-gradient(135deg, #141e30, #243b55);
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: Arial;
  color: white;
}

h1 {
  margin-top: 20px;
}

#score {
  font-size: 20px;
}

#highscore {
  font-size: 16px;
  margin-bottom: 10px;
  color: yellow;
}

canvas {
  background: #000;
  border: 4px solid white;
  border-radius: 10px;
}

/* tombol kontrol */
.controls {
  margin-top: 15px;
  text-align: center;
}

.controls button {
  width: 70px;
  height: 70px;
  font-size: 28px;
  margin: 5px;
  border-radius: 12px;
  background: #27ae60;
  color: white;
  border: none;
}
</style>
</head>

<body>

<h1>🐍 Snake Game</h1>
<div id="score">Score: 0</div>
<div id="highscore">High Score: 0</div>

<canvas id="gameCanvas" width="400" height="400"></canvas>

<!-- tombol arah -->
<div class="controls">
  <button onclick="setDirection('UP')">⬆️</button><br>
  <button onclick="setDirection('LEFT')">⬅️</button>
  <button onclick="setDirection('DOWN')">⬇️</button>
  <button onclick="setDirection('RIGHT')">➡️</button>
</div>

<!-- start & pause -->
<div class="controls">
  <button onclick="startGame()">Start</button>
  <button onclick="pauseGame()">Pause</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let box = 20;
let snake, direction, food, score, game;
let highScore = localStorage.getItem("highScore") || 0;

document.getElementById("highscore").innerText = "High Score: " + highScore;

// keyboard
document.addEventListener("keydown", changeDirection);

// tombol sentuh
function setDirection(newDirection) {
  if (newDirection === "UP" && direction !== "DOWN") direction = "UP";
  else if (newDirection === "DOWN" && direction !== "UP") direction = "DOWN";
  else if (newDirection === "LEFT" && direction !== "RIGHT") direction = "LEFT";
  else if (newDirection === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
}

function startGame() {
  snake = [{x: 200, y: 200}];
  direction = "RIGHT";
  food = randomFood();
  score = 0;
  document.getElementById("score").innerText = "Score: 0";
  clearInterval(game);
  game = setInterval(draw, 120);
}

function pauseGame() {
  clearInterval(game);
}

function changeDirection(event) {
  if (event.key === "ArrowUp") setDirection("UP");
  else if (event.key === "ArrowDown") setDirection("DOWN");
  else if (event.key === "ArrowLeft") setDirection("LEFT");
  else if (event.key === "ArrowRight") setDirection("RIGHT");
}

function randomFood() {
  return {
    x: Math.floor(Math.random() * 20) * box,
    y: Math.floor(Math.random() * 20) * box
  };
}

function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, 400, 400);

  // ular
  for (let i = 0; i < snake.length; i++) {
    ctx.fillStyle = i === 0 ? "#00ffcc" : "#00cc99";
    ctx.fillRect(snake[i].x, snake[i].y, box, box);
  }

  // makanan
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, box, box);

  let headX = snake[0].x;
  let headY = snake[0].y;

  if (direction === "UP") headY -= box;
  if (direction === "DOWN") headY += box;
  if (direction === "LEFT") headX -= box;
  if (direction === "RIGHT") headX += box;

  // makan
  if (headX === food.x && headY === food.y) {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    food = randomFood();
  } else {
    snake.pop();
  }

  let newHead = {x: headX, y: headY};

  // tabrakan
  if (
    headX < 0 || headY < 0 ||
    headX >= 400 || headY >= 400 ||
    collision(newHead, snake)
  ) {
    gameOver();
  }

  snake.unshift(newHead);
}

function collision(head, body) {
  for (let i = 0; i < body.length; i++) {
    if (head.x === body[i].x && head.y === body[i].y) {
      return true;
    }
  }
  return false;
}

function gameOver() {
  clearInterval(game);

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("highScore", highScore);
  }

  alert("Game Over 😢\nScore: " + score);
}

// swipe layar HP
let touchStartX = 0;
let touchStartY = 0;

canvas.addEventListener("touchstart", function(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", function(e) {
  let touchEndX = e.changedTouches[0].clientX;
  let touchEndY = e.changedTouches[0].clientY;

  let dx = touchEndX - touchStartX;
  let dy = touchEndY - touchStartY;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0) setDirection("RIGHT");
    else setDirection("LEFT");
  } else {
    if (dy > 0) setDirection("DOWN");
    else setDirection("UP");
  }
});
</script>

</body>
</html>
