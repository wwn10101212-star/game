<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game Edu 🐍</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #11998e, #38ef7d);
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: Arial;
  color: white;
}

/* HEADER */
h1 {
  margin-top: 20px;
}

#score {
  font-size: 20px;
  margin-bottom: 10px;
}

/* CANVAS */
canvas {
  background: #000;
  border: 4px solid white;
  border-radius: 10px;
  touch-action: none;
}

/* TOMBOL ARAH */
.controls {
  margin-top: 10px; /* dekat dengan game */
  text-align: center;
}

.controls button {
  width: 95px;
  height: 95px;
  font-size: 38px;
  margin: 6px;
  border-radius: 18px;
  background: #27ae60;
  color: white;
  border: none;
}

/* efek ditekan */
.controls button:active {
  background: #2ecc71;
  transform: scale(0.92);
}
</style>
</head>

<body>

<h1>🐍 Snake Game</h1>
<div id="score">Score: 0</div>

<canvas id="gameCanvas" width="350" height="350"></canvas>

<!-- TOMBOL ARAH BESAR -->
<div class="controls">
  <button onclick="setDirection('UP')">⬆️</button><br>
  <button onclick="setDirection('LEFT')">⬅️</button>
  <button onclick="setDirection('DOWN')">⬇️</button>
  <button onclick="setDirection('RIGHT')">➡️</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let box = 20;
let snake = [{x: 160, y: 160}];
let direction = "RIGHT";
let food = randomFood();
let score = 0;

// keyboard
document.addEventListener("keydown", changeDirection);

// tombol
function setDirection(newDirection) {
  if (newDirection === "UP" && direction !== "DOWN") direction = "UP";
  else if (newDirection === "DOWN" && direction !== "UP") direction = "DOWN";
  else if (newDirection === "LEFT" && direction !== "RIGHT") direction = "LEFT";
  else if (newDirection === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
}

function changeDirection(event) {
  if (event.key === "ArrowUp") setDirection("UP");
  else if (event.key === "ArrowDown") setDirection("DOWN");
  else if (event.key === "ArrowLeft") setDirection("LEFT");
  else if (event.key === "ArrowRight") setDirection("RIGHT");
}

function randomFood() {
  return {
    x: Math.floor(Math.random() * 17) * box,
    y: Math.floor(Math.random() * 17) * box
  };
}

function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, 350, 350);

  // ular
  for (let i = 0; i < snake.length; i++) {
    ctx.fillStyle = i === 0 ? "#00ffcc" : "#00cc99";
    ctx.fillRect(snake[i].x, snake[i].y, box, box);
  }

  // makanan
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, box, box);

  let headX = snake[0].x;
  let headY = snake[0].y;

  if (direction === "UP") headY -= box;
  if (direction === "DOWN") headY += box;
  if (direction === "LEFT") headX -= box;
  if (direction === "RIGHT") headX += box;

  // makan
  if (headX === food.x && headY === food.y) {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    food = randomFood();
  } else {
    snake.pop();
  }

  let newHead = {x: headX, y: headY};

  // tabrakan
  if (
    headX < 0 || headY < 0 ||
    headX >= 350 || headY >= 350 ||
    collision(newHead, snake)
  ) {
    alert("Game Over 😢");
    location.reload();
  }

  snake.unshift(newHead);
}

function collision(head, body) {
  for (let i = 0; i < body.length; i++) {
    if (head.x === body[i].x && head.y === body[i].y) {
      return true;
    }
  }
  return false;
}

// loop
setInterval(draw, 120);

// SWIPE
let startX = 0;
let startY = 0;

canvas.addEventListener("touchstart", function(e) {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", function(e) {
  let endX = e.changedTouches[0].clientX;
  let endY = e.changedTouches[0].clientY;

  let dx = endX - startX;
  let dy = endY - startY;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 30) setDirection("RIGHT");
    else if (dx < -30) setDirection("LEFT");
  } else {
    if (dy > 30) setDirection("DOWN");
    else if (dy < -30) setDirection("UP");
  }
});
</script>

</body>
</html>
